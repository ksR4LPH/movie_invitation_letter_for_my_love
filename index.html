<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Билет на двоих</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --burgundy:#6B1E2A;
    --burgundy-dark:#4A1420;
    --cream:#FBF1E4;
    --gold:#C9A24B;
    --blush:#E88AA0;
    --ink:#2B1B1F;
    --minion:#F5C518;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--burgundy-dark);
    font-family:'Quicksand', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  .page{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:var(--cream);
    position:relative;
    overflow-x:hidden;
    box-shadow:0 0 40px rgba(0,0,0,0.35);
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    height:340px;
    background:
      radial-gradient(circle at 30% 20%, rgba(245,197,24,0.18), transparent 55%),
      linear-gradient(160deg, var(--burgundy) 0%, var(--burgundy-dark) 75%);
    overflow:hidden;
    display:flex;
    align-items:flex-end;
  }
  /* Replace this block with your own photo:
     background-image:url('your-photo.jpg'); background-size:cover; background-position:center;
     -> add the rule to .hero-photo below */
 .hero-photo{
    position:absolute;
    inset:0;
    background-image:url('Screenshot 2026-07-13 at 22.17.37.png');
    background-size:cover;
    background-position:center;
    opacity:0.55;
    mix-blend-mode:luminosity;
}
  .hero::after{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(74,20,32,0) 0%, rgba(74,20,32,0.92) 100%);
  }
  .film-grain{
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, transparent 2px, transparent 4px);
    pointer-events:none;
  }
  .hero-content{
    position:relative;
    z-index:2;
    padding:0 28px 26px;
    color:var(--cream);
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--minion);
    font-weight:700;
    display:inline-block;
    margin-bottom:8px;
  }
  .hero h1{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:700;
    font-size:34px;
    line-height:1.08;
    margin:0 0 10px;
  }
  .hero p{
    margin:0;
    font-size:14.5px;
    line-height:1.5;
    opacity:0.92;
    max-width:300px;
  }

  /* ---------- TICKET ---------- */
  .ticket{
    position:relative;
    margin:-18px 16px 24px;
    background:#fff;
    border-radius:20px;
    padding:26px 22px 28px;
    box-shadow:0 18px 30px -14px rgba(74,20,32,0.35);
    z-index:3;
  }

  .row-fixed{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 0;
  }
  .stub-label{
    font-size:11.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:700;
    display:block;
  }
  .row-fixed .stub-label{margin-bottom:0;}
  .stub-value{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:16px;
    color:var(--burgundy-dark);
    text-align:right;
  }

  .perforation{
    position:relative;
    height:1px;
    margin:16px -22px;
    border-top:2px dashed #E4D3C0;
  }
  .perforation::before,.perforation::after{
    content:"";
    position:absolute;
    top:-9px;
    width:18px;height:18px;
    background:var(--burgundy-dark);
    border-radius:50%;
  }
  .perforation::before{left:-9px;}
  .perforation::after{right:-9px;}

  .field-group{margin:14px 0 4px;}
  .field-group > .stub-label{margin-bottom:12px;}

  /* cinema cards */
  .cinema-grid{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .cinema-card{
    border:1.5px solid #EDE0CE;
    border-radius:14px;
    padding:12px 14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:12px;
    transition:border-color .18s, background .18s, transform .12s;
    background:#FFFDF9;
  }
  .cinema-card:active{transform:scale(0.98);}
  .cinema-card.active{
    border-color:var(--burgundy);
    background:linear-gradient(0deg, rgba(245,197,24,0.10), rgba(245,197,24,0.10));
  }
  .cinema-radio{
    width:18px;height:18px;
    border-radius:50%;
    border:2px solid var(--gold);
    flex:0 0 auto;
    position:relative;
  }
  .cinema-card.active .cinema-radio{border-color:var(--burgundy);}
  .cinema-card.active .cinema-radio::after{
    content:"";
    position:absolute;
    inset:3px;
    border-radius:50%;
    background:var(--burgundy);
  }
  .cinema-text{display:flex; flex-direction:column;}
  .cinema-name{font-weight:700; font-size:15px; color:var(--ink);}
  .cinema-addr{font-size:12.5px; color:#8A7A6E; margin-top:2px;}

  /* time pickers */
  .time-group{
    display:flex;
    gap:14px;
  }
  .time-field{flex:1;}
  .time-field .stub-label{margin-bottom:8px;}
  .time-field input[type="time"]{
    width:100%;
    border:1.5px solid #EDE0CE;
    border-radius:12px;
    padding:11px 10px;
    font-family:'Quicksand', sans-serif;
    font-size:15px;
    font-weight:600;
    color:var(--burgundy-dark);
    background:#FFFDF9;
  }
  .time-field input[type="time"]:focus{
    outline:2px solid var(--blush);
    outline-offset:1px;
  }

  .send-btn{
    width:100%;
    margin-top:22px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:var(--burgundy);
    color:var(--cream);
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:16px;
    letter-spacing:0.02em;
    cursor:pointer;
    transition:background .18s, transform .12s;
  }
  .send-btn:active{transform:scale(0.98);}
  .send-btn:disabled{background:#B79A8E; cursor:default;}
  .send-btn:focus-visible{outline:2px solid var(--minion); outline-offset:2px;}

  .hint{
    text-align:center;
    font-size:13px;
    min-height:18px;
    margin:12px 0 0;
    color:var(--burgundy-dark);
    font-weight:600;
  }
  .hint.error{color:#B23A3A;}

  /* stamp overlay */
  .stamp-overlay{
    position:fixed;
    inset:0;
    background:rgba(43,27,31,0.55);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s;
    z-index:20;
  }
  .stamp-overlay.show{opacity:1; pointer-events:auto;}
  .stamp{
    background:var(--cream);
    border:4px solid var(--burgundy);
    color:var(--burgundy);
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-style:italic;
    font-size:20px;
    padding:22px 30px;
    border-radius:10px;
    transform:rotate(-8deg) scale(0.7);
    transition:transform .35s cubic-bezier(.2,1.4,.4,1);
    text-align:center;
    max-width:260px;
    box-shadow:0 10px 24px rgba(0,0,0,0.25);
  }
  .stamp-overlay.show .stamp{transform:rotate(-8deg) scale(1);}
  .stamp span{
    display:block;
    font-family:'Quicksand', sans-serif;
    font-style:normal;
    font-weight:600;
    font-size:13px;
    color:var(--ink);
    margin-top:8px;
  }
  .stamp-close{
    display:inline-block;
    margin-top:14px;
    /* font-family:'Quicksand', sans-serif; */
    font-weight:700;
    font-size:13px;
    color:var(--cream);
    background:var(--burgundy);
    padding:8px 18px;
    border-radius:20px;
    cursor:pointer;
  }
</style>
</head>
<body>

<div class="page">
  <div class="hero">
    <div class="hero-photo" id="heroPhoto"></div>
    <div class="film-grain"></div>
    <div class="hero-content">
      <span class="eyebrow">Персональное приглашение</span>
      <h1>Пойдём в&nbsp;кино)</h1>
      <p>Фильм идёт около 1,5 часов, но время с тобой я хочу растянуть подольше 💛</p>
    </div>
  </div>

  <div class="ticket">
    <div class="row-fixed">
      <span class="stub-label">Фильм</span>
      <span class="stub-value">🎬 Миньоны</span>
    </div>
    <div class="perforation"></div>
    <div class="row-fixed">
      <span class="stub-label">Дата</span>
      <span class="stub-value">17 июля · Пятница</span>
    </div>

    <div class="perforation"></div>

    <div class="field-group">
      <span class="stub-label">Выбери кинотеатр</span>
      <div class="cinema-grid" id="cinemaGrid"></div>
    </div>

    <div class="perforation"></div>

    <div class="field-group time-group">
      <div class="time-field">
        <label class="stub-label" for="meetTime">Встреча</label>
        <input type="time" id="meetTime" value="18:00">
      </div>
      <div class="time-field">
        <label class="stub-label" for="byeTime">Прощание</label>
        <input type="time" id="byeTime" value="21:30">
      </div>
    </div>

    <button class="send-btn" id="sendBtn">Отправить билет 🎟️</button>
    <p class="hint" id="statusMsg"></p>
  </div>
</div>

<div class="stamp-overlay" id="stampOverlay">
  <div class="stamp">
    Билет подтверждён
    <span>Я жду тебя 17-го 💛</span>
    <span class="stamp-close" id="stampClose">Хорошо</span>
  </div>
</div>

<script>
  const CINEMAS = [
    { name: "Mega Cinema", addr: "Юнусабад-11, ТРЦ Mega Planet, 4 этаж" },
    { name: "Cinemaplex", addr: "Богишамол, 260 (Юнусабадский р-н)" },
    { name: "Cinematica", addr: "Олмазор, 2А, 4 этаж" },
    { name: "Riviera Cinema", addr: "пересечение ул. Нурафшан и Себзар" },
    { name: "Royal Cinema 3D", addr: "ТРЦ Samarqand Darvoza, ул. Коратош 5А" },
    { name: "Parus Cinema", addr: "Чиланзар, ул. Катартал 60, ТРЦ Parus" },
    { name: "Next Cinema", addr: "Яккасарай, ул. Бабура 6, ТРК Next" },
    // { name: "Premier Hall", addr: "Яккасарай, ул. Кунаева 25" },
    // { name: "Vega Cinema", addr: "Чиланзар, ул. Шота Руставели 150, ТРЦ Vega Centre" },
    { name: "Compass Cinema", addr: "Куйлюк, Большая кольцевая дорога 17, ТРЦ Compass" },
    { name: "Drive Cinema", addr: "Anhor Lokomotiv, парк, картодром, 3 этаж" },
    // { name: "Дворец кино им. Алишера Навои", addr: "просп. Навои 15 (м. Пахтакор)" },
    { name: "Tashkent City Mall Cinema", addr: "ул. Батыра Закирова 7, Tashkent City Mall" },
    { name: "Salom Cinema", addr: "ул. Буюк Ипак Йули 158А" },
    // { name: "Sergeli Cinema", addr: "Сергели, ул. Новый Сергели 11/2" }
  ];

  const BOT_TOKEN = "8591247714:AAFky4D8-7gGTONAtSq_KTMKIXWAUUjn6d0";
  const CHAT_IDS = ["6001534487", "519909160"];

  let selectedCinema = null;

  const grid = document.getElementById('cinemaGrid');
  CINEMAS.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'cinema-card';
    card.setAttribute('role', 'radio');
    card.setAttribute('aria-checked', 'false');
    card.tabIndex = 0;
    card.innerHTML = `
      <div class="cinema-radio"></div>
      <div class="cinema-text">
        <span class="cinema-name">${c.name}</span>
        <span class="cinema-addr">${c.addr}</span>
      </div>`;
    const select = () => {
      document.querySelectorAll('.cinema-card').forEach(el => {
        el.classList.remove('active');
        el.setAttribute('aria-checked', 'false');
      });
      card.classList.add('active');
      card.setAttribute('aria-checked', 'true');
      selectedCinema = c;
    };
    card.addEventListener('click', select);
    card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(); } });
    grid.appendChild(card);
  });

  const sendBtn = document.getElementById('sendBtn');
  const statusMsg = document.getElementById('statusMsg');
  const stampOverlay = document.getElementById('stampOverlay');
  document.getElementById('stampClose').addEventListener('click', () => stampOverlay.classList.remove('show'));

  sendBtn.addEventListener('click', async () => {
    statusMsg.classList.remove('error');

    if (!selectedCinema) {
      statusMsg.textContent = 'Выбери кинотеатр 🎬';
      statusMsg.classList.add('error');
      return;
    }

    const meetTime = document.getElementById('meetTime').value || '—';
    const byeTime = document.getElementById('byeTime').value || '—';

    const text =
`🎬 Только не забудь)
Фильм: Миньоны
Дата: 17 июля (пятница)
Кинотеатр: ${selectedCinema.name}
Адрес: ${selectedCinema.addr}
Встреча: ${meetTime}
Прощание: ${byeTime}`;

    sendBtn.disabled = true;
    sendBtn.textContent = 'Отправляю...';
    statusMsg.textContent = '';

    try {
      const results = await Promise.all(CHAT_IDS.map(id =>
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: id, text })
        }).then(res => res.json())
      ));
      const failed = results.find(data => !data.ok);
      if (failed) throw new Error(failed.description || 'Telegram error');

      stampOverlay.classList.add('show');
      statusMsg.textContent = 'Билет отправлен 💌';
      lockForm();
    } catch (err) {
      statusMsg.textContent = 'Не получилось отправить, попробуй ещё раз';
      statusMsg.classList.add('error');
      sendBtn.disabled = false;
      sendBtn.textContent = 'Отправить билет 🎟️';
    }
  });

  function lockForm() {
    document.querySelectorAll('.cinema-card').forEach(card => {
      card.style.pointerEvents = 'none';
      card.style.opacity = card.classList.contains('active') ? '1' : '0.45';
      card.tabIndex = -1;
    });
    document.getElementById('meetTime').disabled = true;
    document.getElementById('byeTime').disabled = true;
    sendBtn.disabled = true;
    sendBtn.textContent = 'Билет уже отправлен ✓';
  }
</script>

</body>
</html>
